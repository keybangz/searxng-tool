# SearXNG settings for local MCP use
# Generate a secret key with: openssl rand -hex 32
use_default_settings: true

server:
  secret_key: "replace-with-output-of-openssl-rand-hex-32"
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json
